services:
  # MySQL Database Service (shared by both backends)
  mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: attendance_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  # phpMyAdmin Service (shared for both DBs)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
      APACHE_SERVER_NAME: localhost
    ports:
      - "8081:80"
    networks:
      - app_network

  # Attendance Management Backend
  am-backend:
    build: ./am-backend
    container_name: am_backend_container
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./am-backend:/var/www
      - /var/www/vendor
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=attendance_db
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=secret

  # Employee Management Backend
  em-backend:
    build: ./em-backend
    container_name: em_backend_container
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./em-backend:/var/www
      - /var/www/vendor
    ports:
      - "8001:8001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app_network
    command: >
      sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8001"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8001
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=employee_db
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=secret

  # Frontend (Next.js)
  frontend:
    build: ./am-frontend
    container_name: nextjs_container
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./am-frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - am-backend
    networks:
      - app_network
    command: "npm run dev"
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true

networks:
  app_network:

volumes:
  mysql_data:
